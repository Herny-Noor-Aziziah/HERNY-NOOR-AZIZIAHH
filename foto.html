<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Foto Modern</title>
    <style>
        /* Bagian CSS */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 40px 0;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        /* Grid System untuk Foto */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .photo-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            background-color: #fff;
        }

        .photo-item:hover {
            transform: translateY(-5px);
        }

        .photo-item img {
            width: 100%;
            height: 250px;
            object-fit: cover; /* Agar foto tetap proporsional */
            display: block;
            transition: transform 0.5s ease;
        }

        .photo-item:hover img {
            transform: scale(1.1);
        }

        /* Overlay Keterangan (Opsional) */
        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            padding: 15px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .photo-item:hover .photo-overlay {
            opacity: 1;
        }

        /* Responsif untuk layar kecil */
        @media (max-width: 600px) {
            .photo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Galeri Foto Saya</h1>
            <p>Kumpulan momen favorit dalam satu tampilan bersih.</p>
        </div>

        <div class="photo-grid">
            <div class="photo-item">
                <img src="IMG_2068.jpeg" alt="Foto 1">
                <div class="photo-overlay">
                    <span>Bagian Belakang</span>
                </div>
            </div>

            <div class="photo-item">
                <img src="https://picsum.photos/400/300?random=2" alt="Foto 2">
                <div class="photo-overlay">
                    <span>Pemandangan Kota</span>
                </div>
            </div>

            <div class="photo-item">
                <img src="IMG_2067.jpeg" alt="Foto 3">
                <div class="photo-overlay">
                    <span>Bagian Depan </span>
                </div>
            </div>

            <div class="photo-item">
                <img src="https://picsum.photos/400/300?random=4" alt="Foto 4">
                <div class="photo-overlay">
                    <span>Kuliner Malam</span>
                </div>
            </div>

            <div class="photo-item">
                <img src="https://picsum.photos/400/300?random=5" alt="Foto 5">
                <div class="photo-overlay">
                    <span>Fotografi Makro</span>
                </div>
            </div>

            <div class="photo-item">
                <img src="https://picsum.photos/400/300?random=6" alt="Foto 6">
                <div class="photo-overlay">
                    <span>Cahaya Senja</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
